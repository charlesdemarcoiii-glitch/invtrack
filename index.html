<script>
// ── DATE HELPER ───────────────────────────────────────────────────────────────
function formatDate(ts){
  if(!ts) return "";
  try{
    const d=new Date(ts);
    return d.toLocaleString("en-US",{
      timeZone:"America/New_York",
      month:"short",day:"numeric",year:"numeric",
      hour:"numeric",minute:"2-digit",hour12:true
    });
  }catch(e){return ts;}
}

// ── FIRESTORE DATA LAYER ────────────────────────────────────────────────────
// Replaces Google Sheets — all reads/writes go through Firestore now

async function fsWaitForReady(){
  let tries=0;
  while(!window.fsGetAll && tries<100){
    await new Promise(r=>setTimeout(r,100));
    tries++;
  }
  if(!window.fsGetAll){
    console.error("Firestore failed to load after 10 seconds");
  }
}

async function getItems(){
  await fsWaitForReady();
  return await window.fsGetAll("items");
}

async function getOwners(){
  await fsWaitForReady();
  return await window.fsGetAll("owners");
}

async function getUsers(){
  await fsWaitForReady();
  return await window.fsGetAll("users");
}

async function getOrders(){
  await fsWaitForReady();
  return await window.fsGetAll("orders");
}

async function getLog(){
  await fsWaitForReady();
  return await window.fsGetAll("log");
}

async function addItem(item){
  await window.fsSet("items", item.barcode, item);
}

async function updateItem(barcode, data){
  await window.fsUpdate("items", barcode, data);
}

async function addLog(entry){
  await window.fsAdd("log", entry);
}

async function addOrder(order){
  await window.fsSet("orders", order.id, order);
}

async function updateOrder(orderId, data){
  await window.fsUpdate("orders", orderId, data);
}

async function findItemRow(barcode){
  const item = await window.fsGetOne("items", barcode);
  if(!item) return null;
  // Return in a format compatible with existing code: {rowNum, data: [barcode,name,type,expDate,ownerId,status,addedAt,usedBy]}
  return {
    rowNum: barcode, // Firestore uses doc ID instead of row number
    data: [item.barcode, item.name, item.type, item.expDate, item.ownerId, item.status, item.addedAt, item.usedBy||""]
  };
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  user:null,users:[],owners:[],items:[],orders:[],log:[],
  accounts:[],        // all signed-in accounts [{username,password,role,ownerId}]
  showAccountMenu:false, // account switcher dropdown
  tab:"dashboard",loading:false,toast:null,toastTimer:null,
  scanning:false,scanMode:null,scanHint:"",
  modal:null,selectedOwner:null,
  showScanPrompt:false,
  // Multi-scan
  multiMode:false,
  multiDetails:null,   // {name,type,expDate} entered once
  multiCodes:[],       // barcodes scanned
  showMultiDetails:false,  // step 1: enter details
  showMultiScan:false,     // step 2: scan codes
  showMultiConfirm:false,  // step 3: confirm
  // Order
  activeOrder:null,showOrderGen:false,
  // New order creation flow
  orderItems:[],          // items scanned into order
  showOrderItemScan:false, // scanning items for order
  showOrderQRScan:false,   // scanning the order QR code
  showOrderSummary:false,  // confirm screen before finalizing
  pendingOrderQR:null,     // the scanned QR code for the order
};

function setState(u){Object.assign(S,u);render();}
function showToast(msg,type="ok"){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  const t=setTimeout(()=>setState({toast:null,toastTimer:null}),3500);
  setState({toast:{msg,type},toastTimer:t});
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadData(){
  setState({loading:true});
  try{
    const [owners,items,log,users,orders]=await Promise.all([
      getOwners(),getItems(),getLog(),getUsers(),getOrders()
    ]);
    setState({
      owners:owners.map(o=>({id:o._id,name:o.name,type:o.type})),
      items:items.map(i=>({barcode:i._id,name:i.name,type:i.type,expDate:i.expDate,ownerId:i.ownerId,status:i.status||"active",addedAt:i.addedAt,usedBy:i.usedBy||""})),
      log:log.map(l=>({ts:l.ts,action:l.action,barcode:l.barcode,itemName:l.itemName,from:l.from,to:l.to,user:l.user})).sort((a,b)=>new Date(b.ts)-new Date(a.ts)),
      users:users.map(u=>({username:u._id,role:u.role,ownerId:u.ownerId||""})),
      orders:orders.map(o=>({id:o._id,name:o.name,count:o.count,createdBy:o.createdBy,createdAt:o.createdAt,status:o.status,items:o.items||""})),
      loading:false
    });
  }catch(e){console.error("Load failed:",e);showToast("Could not load data","err");setState({loading:false});}
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function submitCheckin(barcode,name,type,expDate,ownerId){
  const now=new Date().toISOString();
  const ownerName=S.owners.find(o=>o.id===ownerId)?.name||ownerId;
  const orderRef=S.activeOrder?S.activeOrder.id:"";
  // Optimistic UI — update local state immediately
  const newItem={barcode,name,type,expDate,ownerId,status:"active",addedAt:now,usedBy:""};
  setState({items:[...S.items,newItem]});
  // Write to Firestore in background
  addItem(newItem);
  addLog({ts:now,action:"CHECK_IN",barcode,itemName:name,from:orderRef,to:ownerName,user:S.user.username});
}

async function submitMultiCheckin(){
  const {multiDetails,multiCodes,user,owners,activeOrder}=S;
  setState({loading:true,showMultiConfirm:false});
  const pool=owners.find(o=>o.id.toUpperCase()==="POOL")||owners[0];
  const now=new Date().toISOString();
  try{
    // Write all items and logs to Firestore
    for(const barcode of multiCodes){
      await addItem({barcode,name:multiDetails.name,type:multiDetails.type,expDate:multiDetails.expDate,ownerId:pool.id,status:"active",addedAt:now,usedBy:""});
      await addLog({ts:now,action:"CHECK_IN",barcode,itemName:multiDetails.name,from:"",to:pool.name,user:user.username});
    }
    showToast(`✅ ${multiCodes.length} items checked in to ${pool.name}`);
    setState({multiMode:false,multiDetails:null,multiCodes:[],showMultiDetails:false,showMultiScan:false,showMultiConfirm:false,activeOrder:null,scanMode:null});
    await loadData();
  }catch(e){showToast("Write failed — check permissions","err");setState({loading:false});}
}

async function submitCheckout(item){
  const now=new Date().toISOString();
  const ownerName=S.owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
  // Optimistic UI
  const updatedItems=S.items.map(i=>i.barcode===item.barcode?{...i,status:"used",ownerId:"USED",usedBy:S.user.username}:i);
  setState({modal:null,loading:false,items:updatedItems});
  showToast(`📤 ${item.name} → Used`);
  // Write to Firestore in background
  updateItem(item.barcode,{ownerId:"USED",status:"used",usedBy:S.user.username})
    .then(()=>addLog({ts:now,action:"CHECK_OUT",barcode:item.barcode,itemName:item.name,from:ownerName,to:"USED",user:S.user.username}))
    .catch(e=>{console.error("Checkout write failed:",e);showToast("Write failed: "+e.message,"err");});
}

async function submitTransfer(item,toOwnerId){
  const now=new Date().toISOString();
  const fromName=S.owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
  const toName=S.owners.find(o=>o.id===toOwnerId)?.name||toOwnerId;
  // Optimistic UI — update local state immediately
  const updatedItems=S.items.map(i=>i.barcode===item.barcode?{...i,ownerId:toOwnerId}:i);
  setState({modal:null,loading:false,items:updatedItems});
  showToast("🔄 "+item.name+" → "+toName);
  // Write to Firestore in background
  updateItem(item.barcode,{ownerId:toOwnerId})
    .then(()=>addLog({ts:now,action:"TRANSFER",barcode:item.barcode,itemName:item.name,from:fromName,to:toName,user:S.user.username}))
    .catch(e=>console.error("Transfer write failed:",e));
}

async function submitOrderCreate(orderQR, itemBarcodes, orderName){
  const now=new Date().toISOString();
  const user=S.user.username;
  const poolName=S.owners.find(o=>o.id.toUpperCase()==="POOL")?.name||"Pool";

  // Optimistic UI — update local state immediately
  const newOrder={id:orderQR,name:orderName||orderQR,count:itemBarcodes.length,createdBy:user,createdAt:now,status:"transit",items:itemBarcodes.join(",")};
  const updatedItems=S.items.map(i=>itemBarcodes.includes(i.barcode)?{...i,status:"transit",ownerId:"TRANSIT"}:i);
  setState({
    loading:false,
    showOrderSummary:false,
    orderItems:[],
    pendingOrderQR:null,
    showOrderGen:false,
    orders:[...S.orders,newOrder],
    items:updatedItems
  });
  showToast("📦 Order created! "+itemBarcodes.length+" items in transit");

  // Write to Firestore in background
  try{
    await addOrder(newOrder);
    for(const barcode of itemBarcodes){
      await updateItem(barcode,{ownerId:"TRANSIT",status:"transit"});
      await addLog({ts:now,action:"ORDER_OUT",barcode,itemName:"",from:poolName,to:"TRANSIT",user});
    }
  }catch(e){
    console.error("Order create background write failed:",e);
  }
}

let orderReceiveInProgress = false;
async function submitOrderReceive(orderQR, toOwnerId){
  if(orderReceiveInProgress){return;}
  orderReceiveInProgress = true;
  setState({modal:null,loading:true});
  const now=new Date().toISOString();
  const user=S.user.username;
  const toName=S.owners.find(o=>o.id===toOwnerId)?.name||toOwnerId;
  try{
    const orderRow=S.orders.find(o=>o.id===orderQR);
    if(!orderRow){showToast("Order not found","err");setState({loading:false});orderReceiveInProgress=false;return;}
    const barcodes=(orderRow.items||"").split(",").filter(b=>b.trim());
    if(barcodes.length===0){showToast("No items found in order","err");setState({loading:false});orderReceiveInProgress=false;return;}

    // Update each item's owner in Firestore
    for(const barcode of barcodes){
      await updateItem(barcode,{ownerId:toOwnerId,status:"active"});
      await addLog({ts:now,action:"ORDER_IN",barcode,itemName:"",from:"TRANSIT",to:toName,user});
    }

    // Update order status to received
    await updateOrder(orderQR,{status:"received"});

    showToast("✅ "+barcodes.length+" items received into "+toName);
    await loadData();
  }catch(e){
    showToast("Failed: "+e.message,"err");
    setState({loading:false});
  }finally{
    orderReceiveInProgress=false;
  }
}

function handleScan(barcode){
  const {scanMode,activeOrder,items,multiCodes,showMultiScan}=S;
  stopScanner();

  // Order item scan mode — collecting items for a new order
  if(S.showOrderItemScan){
    const item=items.find(i=>i.barcode===barcode);
    if(item){
      if(item.status==="used"){showToast("Item already used","warn");setState({scanning:true});return;}
      if(item.status==="transit"){showToast("Item already in transit","warn");setState({scanning:true});return;}
      if(S.orderItems.includes(barcode)){showToast("Already added to order","warn");setState({scanning:true});return;}
      const newItems=[...S.orderItems,barcode];
      setState({orderItems:newItems,scanning:true});
      showToast("📦 "+newItems.length+" item"+(newItems.length>1?"s":"")+" added to order");
    } else {
      showToast("Item not found — must be checked in first","err");
      setState({scanning:true});
    }
    return;
  }

  // Order QR scan mode — scanning the master QR for the order
  if(S.showOrderQRScan){
    // Make sure this barcode isn't already an order
    if(S.orders.find(o=>o.id===barcode)){showToast("This QR is already an order","err");setState({scanning:true});return;}
    // Make sure it's not an active item
    const existingItem=items.find(i=>i.barcode===barcode);
    if(existingItem&&existingItem.status==="active"&&!S.orderItems.includes(barcode)){
      showToast("This QR belongs to an active item — use a blank QR","warn");setState({scanning:true});return;
    }
    setState({scanning:false,showOrderQRScan:false,pendingOrderQR:barcode,showOrderSummary:true});
    return;
  }

  // Multi-scan mode — just collect codes
  if(showMultiScan){
    if(items.find(i=>i.barcode===barcode)){showToast("Already tracked: "+barcode,"warn");setState({scanning:true});return;}
    if(multiCodes.includes(barcode)){showToast("Already scanned this code","warn");setState({scanning:true});return;}
    const newCodes=[...multiCodes,barcode];
    setState({multiCodes:newCodes,scanning:true});
    showToast(`📦 Code ${newCodes.length} scanned`);
    return;
  }

  setState({scanning:false});

  if(scanMode==="order"&&!activeOrder){
    const order=S.orders.find(o=>o.id===barcode);
    if(!order){showToast("Order not found","err");return;}
    setState({activeOrder:order,scanning:true,scanHint:"Scan items to add to order"});
    showToast(`📦 Order: ${order.name} — scan items`);
    return;
  }
  if(scanMode==="order"&&activeOrder){
    if(items.find(i=>i.barcode===barcode)){showToast("Already tracked","warn");setState({scanning:true});return;}
    setState({modal:{type:"checkin",barcode,orderMode:true}});return;
  }
  if(scanMode==="checkin"){
    if(items.find(i=>i.barcode===barcode)){showToast("Already tracked — item exists","warn");return;}
    setState({modal:{type:"checkin",barcode,orderMode:false}});return;
  }
  if(scanMode==="checkout"){
    const item=items.find(i=>i.barcode===barcode);
    if(!item){showToast("Item not found","err");return;}
    if(item.status==="used"){showToast("Already checked out","warn");return;}
    if(S.user.role!=="admin"&&item.ownerId!==S.user.ownerId){showToast("You can only check out items in your own inventory","err");return;}
    setState({modal:{type:"checkout",item}});return;
  }
  if(scanMode==="transfer"){
    // Check if this is an order QR code first
    const order=S.orders.find(o=>o.id===barcode);
    if(order){
      if(order.status==="received"){showToast("Order already received","warn");return;}
      const barcodes=(order.items||"").split(",").filter(b=>b.trim());
      if(barcodes.length===0){showToast("Order has no items","warn");return;}
      setState({modal:{type:"receive_order",order,barcodes,toOwnerId:S.user.role==="admin"?"":S.user.ownerId}});
      return;
    }
    const item=items.find(i=>i.barcode===barcode);
    if(!item){showToast("Item not found — check in first","err");return;}
    if(item.status==="used"){showToast("Item already used","warn");return;}
    if(item.status==="transit"){showToast("Item is in transit — receive the order instead","warn");return;}
    if(S.user.role!=="admin"&&item.ownerId===S.user.ownerId){
      showToast("Item is already in your inventory","warn");return;
    }
    setState({modal:{type:"transfer",item}});
  }
}

// ── SCANNER ───────────────────────────────────────────────────────────────────
let scanStream=null,scanInterval=null;
function startScanner(){
  const video=document.getElementById("scan-video");
  const canvas=document.getElementById("scan-canvas");
  const status=document.getElementById("scan-status");
  if(!video||!canvas)return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}})
    .then(stream=>{
      scanStream=stream;video.srcObject=stream;video.play();
      if(window.jsQR){
        if(status)status.textContent=S.scanHint||"Point camera at QR code";
        scanInterval=setInterval(()=>{
          if(video.readyState!==4)return;
          const size=Math.min(video.videoWidth,video.videoHeight)*0.8;
          const x=(video.videoWidth-size)/2,y=(video.videoHeight-size)/2;
          canvas.width=size;canvas.height=size;
          const ctx=canvas.getContext("2d");
          ctx.drawImage(video,x,y,size,size,0,0,size,size);
          const img=ctx.getImageData(0,0,size,size);
          const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
          if(code&&code.data)handleScan(code.data);
        },150);
      }else{if(status)status.textContent="Type code manually below";}
    })
    .catch(()=>{const s=document.getElementById("scan-status");if(s)s.textContent="Camera unavailable — type code below";});
}
function stopScanner(){
  clearInterval(scanInterval);scanInterval=null;
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
}

// ── EL HELPER ─────────────────────────────────────────────────────────────────
function el(tag,attrs={},...children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="onclick")e.onclick=v;
    else if(k==="onchange")e.onchange=v;
    else if(k==="oninput")e.oninput=v;
    else if(k==="onkeydown")e.onkeydown=v;
    else if(k==="style")Object.assign(e.style,v);
    else if(k==="class")e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null)continue;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  let email="",password="",showPass=false;
  const div=el("div",{style:{minHeight:"100vh",background:"#0a0f1c",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}});
  const card=el("div",{style:{width:"100%",maxWidth:"380px",background:"#111827",borderRadius:"20px",padding:"32px",border:"1px solid #1e293b"}});
  const icon=el("div",{style:{textAlign:"center",marginBottom:"32px"}});
  icon.innerHTML=`<div style="font-size:48px;margin-bottom:10px">📦</div><h1 style="font-weight:800;font-size:26px;background:linear-gradient(90deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0">InvTrack</h1><p style="color:#475569;font-size:14px;margin:8px 0 0">Sign in to your inventory</p>`;
  card.appendChild(icon);

  const eLabel=el("label",{class:"label"},"Email");
  const eInput=el("input",{type:"email",placeholder:"Enter your email"});
  eInput.oninput=e=>email=e.target.value;
  eInput.onkeydown=e=>{if(e.key==="Enter")doLogin();};
  card.appendChild(eLabel);card.appendChild(eInput);card.appendChild(el("div",{style:{height:"16px"}}));

  const pLabel=el("label",{class:"label"},"Password");
  const pWrap=el("div",{style:{position:"relative"}});
  const pInput=el("input",{type:"password",placeholder:"Enter password",style:{paddingRight:"48px"}});
  pInput.oninput=e=>password=e.target.value;
  pInput.onkeydown=e=>{if(e.key==="Enter")doLogin();};
  const eyeBtn=el("button",{style:{position:"absolute",right:"14px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#475569",fontSize:"18px",padding:"0"}},"👁");
  eyeBtn.onclick=()=>{showPass=!showPass;pInput.type=showPass?"text":"password";eyeBtn.textContent=showPass?"🙈":"👁";};
  pWrap.appendChild(pInput);pWrap.appendChild(eyeBtn);
  card.appendChild(pLabel);card.appendChild(pWrap);

  const errDiv=el("div",{style:{minHeight:"28px"}});
  card.appendChild(errDiv);

  const loginBtn=el("button",{class:"btn btn-primary",style:{marginTop:"16px"}},"Sign In →");
  loginBtn.onclick=doLogin;
  card.appendChild(loginBtn);

  function doLogin(){
    if(!email||!password){errDiv.innerHTML=`<p style="color:#f87171;font-size:13px;text-align:center;margin:8px 0 0">⚠ Enter email and password</p>`;return;}
    loginBtn.textContent="Signing in…";loginBtn.disabled=true;
    if(!window.firebaseSignIn){errDiv.innerHTML=`<p style="color:#f87171;font-size:13px;text-align:center;margin:8px 0 0">⚠ Auth not loaded yet, try again</p>`;loginBtn.textContent="Sign In →";loginBtn.disabled=false;return;}
    window.firebaseSignIn(email,password)
      .then(cred=>{
        const firebaseEmail=cred.user.email;
        // Match Firebase email to Users sheet row
        const u=S.users.find(u=>u.username.toLowerCase()===firebaseEmail.toLowerCase()||u.email&&u.email.toLowerCase()===firebaseEmail.toLowerCase());
        if(u){
          const existing=S.accounts.find(a=>a.username.toLowerCase()===(u.username||firebaseEmail).toLowerCase());
          const accounts=existing?S.accounts:[...S.accounts,{...u,email:firebaseEmail}];
          setState({user:{...u,email:firebaseEmail,username:u.username||firebaseEmail},accounts,showAccountMenu:false});
        } else {
          // Use Firebase email as username, default to user role
          const newUser={username:firebaseEmail,email:firebaseEmail,role:"user",ownerId:""};
          setState({user:newUser,accounts:[...S.accounts,newUser],showAccountMenu:false});
        }
      })
      .catch(err=>{
        let msg="Incorrect email or password";
        if(err.code==="auth/user-not-found")msg="No account found with this email";
        if(err.code==="auth/wrong-password")msg="Incorrect password";
        if(err.code==="auth/invalid-email")msg="Invalid email address";
        if(err.code==="auth/too-many-requests")msg="Too many attempts — try again later";
        errDiv.innerHTML=`<p style="color:#f87171;font-size:13px;text-align:center;margin:8px 0 0">⚠ ${msg}</p>`;
        loginBtn.textContent="Sign In →";loginBtn.disabled=false;
      });
  }
  div.appendChild(card);return div;
}

      const counts={};
      displayItems.forEach(function(item){
        if(itemTypes.includes(item.name)){
          counts[item.name]=(counts[item.name]||0)+1;
        }
      });
      const hasKnown=Object.keys(counts).length>0;
      if(hasKnown){
        const summaryCard=document.createElement("div");
        summaryCard.style.cssText="background:#111827;border-radius:12px;border:1px solid #1e293b;padding:14px 16px;margin-bottom:16px;";
        const summaryTitle=document.createElement("p");
        summaryTitle.style.cssText="color:#94a3b8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px;";
        summaryTitle.textContent=selectedOwner?"Count — "+selectedOwner.name:"Count — All Inventories";
        summaryCard.appendChild(summaryTitle);
        const grid=document.createElement("div");
        grid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;";
        itemTypes.forEach(function(t){
          if(counts[t]){
            const chip=document.createElement("div");
            chip.style.cssText="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 10px;text-align:center;";
            chip.innerHTML="<div style='color:#38bdf8;font-weight:700;font-size:18px'>"+counts[t]+"</div><div style='color:#64748b;font-size:11px;margin-top:2px'>"+t+"</div>";
            grid.appendChild(chip);
          }
        });
        summaryCard.appendChild(grid);
        content.appendChild(summaryCard);
      }
    }
    // Show transit items if admin
    const transitItems=items.filter(i=>i.status==="transit");
    if(isAdmin&&transitItems.length>0){
      const tCard=document.createElement("div");
      tCard.style.cssText="background:#431407;border:1px solid #78350f;border-radius:10px;padding:14px;margin-bottom:12px;";
      tCard.innerHTML="<p style='color:#fcd34d;font-weight:700;font-size:13px;margin:0 0 8px'>🚚 In Transit ("+transitItems.length+")</p>"
        +transitItems.map(i=>"<p style='color:#fbbf24;font-size:12px;margin:2px 0'>• "+i.name+" — "+i.barcode+"</p>").join("");
      content.appendChild(tCard);
    }
    if(displayItems.length===0)content.appendChild(el("p",{style:{color:"#334155",textAlign:"center",fontSize:"13px",marginTop:"30px"}},"No active items"));
    displayItems.forEach(item=>{
      const isExp=item.expDate&&new Date(item.expDate)<new Date();
      const days=item.expDate?Math.ceil((new Date(item.expDate)-Date.now())/86400000):null;
      const soon=days!==null&&days>=0&&days<=120;
      const card=el("div",{style:{background:"#111827",borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",border:`1px solid ${isExp?"#7f1d1d":soon?"#78350f":"#1e293b"}`}});
      const badge=isExp?`<span class="badge" style="background:#7f1d1d;color:#fca5a5">EXPIRED</span>`:soon?`<span class="badge" style="background:#78350f;color:#fcd34d">${days}d LEFT</span>`:`<span class="badge" style="background:#14532d;color:#86efac">OK</span>`;
      card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:700;color:#f1f5f9;font-size:14px">${item.name}</div><div style="color:#64748b;font-size:11px;margin-top:2px;font-family:monospace">${item.barcode} · ${item.type}</div></div>${badge}</div><div style="display:flex;gap:12px;margin-top:6px"><span style="color:#64748b;font-size:11px">Exp: ${item.expDate||"—"}</span>${isAdmin?`<span style="color:#64748b;font-size:11px">Owner: ${owners.find(o=>o.id===item.ownerId)?.name||item.ownerId}</span>`:""}</div>`;
      content.appendChild(card);
    });
  }

  // USED INVENTORY
  if(tab==="used"){
    content.appendChild(el("p",{style:{color:"#475569",fontSize:"12px",fontWeight:"600",margin:"0 0 12px",textTransform:"uppercase",letterSpacing:".07em"}},isAdmin?"All Used Items":"Your Used Items"));
    if(visUsedItems.length===0)content.appendChild(el("p",{style:{color:"#334155",textAlign:"center",fontSize:"13px",marginTop:"30px"}},"No used items yet"));
    visUsedItems.forEach(item=>{
      const card=el("div",{style:{background:"#111827",borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",border:"1px solid #374151"}});
      card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:700;color:#9ca3af;font-size:14px">${item.name}</div><div style="color:#64748b;font-size:11px;margin-top:2px;font-family:monospace">${item.barcode} · ${item.type}</div></div><span class="badge" style="background:#374151;color:#9ca3af">USED</span></div><div style="display:flex;gap:12px;margin-top:6px">${item.expDate?`<span style="color:#64748b;font-size:11px">Exp: ${item.expDate}</span>`:""}${isAdmin?`<span style="color:#64748b;font-size:11px">Used by: ${item.usedBy||"—"}</span>`:""}</div>`;
      content.appendChild(card);
    });
  }

  // ORDERS
  if(tab==="orders"){
    // Order QR creation handled via the Order button in the action bar
    if(orders.length===0)content.appendChild(el("p",{style:{color:"#334155",textAlign:"center",fontSize:"13px",marginTop:"20px"}},"No orders yet"));
    orders.forEach(order=>{
      const card=el("div",{class:"card"});
      const statusColors={"transit":"#fbbf24","received":"#86efac","open":"#38bdf8"};
      const statusBgs={"transit":"#78350f","received":"#14532d","open":"#0f172a"};
      const st=order.status||"open";
      const barcodes=(order.items||"").split(",").filter(b=>b.trim());
      card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:700;color:#f1f5f9;font-size:14px">${order.name||order.id}</div><div style="color:#64748b;font-size:11px;font-family:monospace;margin-top:2px">${order.id}</div><div style="color:#64748b;font-size:11px;margin-top:2px">Items: ${barcodes.length} · By: ${order.createdBy}</div></div><span class="badge" style="background:${statusBgs[st]||"#1e293b"};color:${statusColors[st]||"#64748b"}">${st.toUpperCase()}</span></div><div style="color:#64748b;font-size:11px;margin-top:6px">${order.createdAt?formatDate(order.createdAt):""}</div>`;
      content.appendChild(card);
    });
  }

  // LOG
  if(tab==="log"){
    const displayLog=isAdmin?S.log:S.log.filter(e=>e.user===user.username||e.from===owners.find(o=>o.id===user.ownerId)?.name||e.to===owners.find(o=>o.id===user.ownerId)?.name);
    if(displayLog.length===0)content.appendChild(el("p",{style:{color:"#334155",textAlign:"center",fontSize:"13px",marginTop:"30px"}},"No activity yet"));
    displayLog.forEach((entry,i)=>{
      const colors={CHECK_IN:"#22c55e",CHECK_OUT:"#f59e0b",TRANSFER:"#6366f1"};
      const icons={CHECK_IN:"📥",CHECK_OUT:"📤",TRANSFER:"🔄"};
      const card=el("div",{style:{background:"#111827",borderRadius:"10px",padding:"11px 14px",marginBottom:"7px",border:"1px solid #1e293b",display:"flex",gap:"12px"}});
      card.innerHTML=`<span style="font-size:20px">${icons[entry.action]||"📋"}</span><div style="flex:1"><div style="display:flex;justify-content:space-between"><span style="color:${colors[entry.action]||"#94a3b8"};font-weight:700;font-size:12px">${entry.action?.replace("_"," ")}</span><span style="color:#334155;font-size:11px">${entry.ts?formatDate(entry.ts):""}</span></div><div style="color:#f1f5f9;font-size:13px;margin-top:2px">${entry.itemName}</div><div style="display:flex;gap:10px;margin-top:3px"><span style="color:#64748b;font-size:11px;font-family:monospace">${entry.barcode}</span><span style="color:#475569;font-size:11px">by ${entry.user}</span></div>${entry.action==="TRANSFER"?`<div style="color:#818cf8;font-size:11px;margin-top:2px">${entry.from} → ${entry.to}</div>`:""}${entry.action==="CHECK_OUT"?`<div style="color:#fb923c;font-size:11px;margin-top:2px">from ${entry.from} → Used</div>`:""}${entry.action==="CHECK_IN"&&entry.from?.startsWith("ORD-")?`<div style="color:#818cf8;font-size:11px;margin-top:2px">Order: ${entry.from}</div>`:""}</div>`;
      content.appendChild(card);
    });
  }

  wrap.appendChild(content);
  return wrap;
}

// ── SCANNER OVERLAY ───────────────────────────────────────────────────────────
function renderScanner(){
  const div=el("div",{style:{position:"fixed",inset:"0",background:"rgba(10,15,28,0.98)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:"800",gap:"14px",padding:"20px 16px"}});

  // Show scanned count if in multi-scan mode
  if(S.showMultiScan&&S.multiCodes.length>0){
    const counter=el("div",{style:{background:"#0ea5e918",border:"1px solid #0ea5e933",borderRadius:"10px",padding:"10px 20px",textAlign:"center"}});
    counter.innerHTML=`<span style="color:#38bdf8;font-weight:700;font-size:16px">📦 ${S.multiCodes.length} code${S.multiCodes.length>1?"s":""} scanned</span>`;
    div.appendChild(counter);
  }

  const status=el("p",{id:"scan-status",style:{color:"#7dd3fc",fontSize:"13px",margin:"0",textAlign:"center",fontFamily:"monospace"}},S.showMultiScan?"Scan next code or tap Done":"Starting camera…");
  div.appendChild(status);
  const videoWrap=el("div",{style:{position:"relative",width:"100%",maxWidth:"320px",borderRadius:"16px",overflow:"hidden",border:"2px solid #0ea5e9"}});
  const video=el("video",{id:"scan-video",autoplay:"",playsinline:"",muted:"",style:{width:"100%",display:"block",background:"#000",minHeight:"240px"}});
  const canvas=el("canvas",{id:"scan-canvas",style:{display:"none"}});
  const overlay=el("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}});
  const box=el("div",{style:{width:"160px",height:"160px",border:"3px solid #0ea5e9",borderRadius:"12px",boxShadow:"0 0 0 9999px rgba(0,0,0,0.5)"}});
  overlay.appendChild(box);videoWrap.appendChild(video);videoWrap.appendChild(canvas);videoWrap.appendChild(overlay);
  div.appendChild(videoWrap);



  // Done button for order item scanning
  if(S.showOrderItemScan){
    const countBadge=document.createElement("div");
    countBadge.style.cssText="background:#6366f118;border:1px solid #6366f133;border-radius:10px;padding:8px 16px;text-align:center;width:100%;max-width:320px;";
    countBadge.innerHTML="<span style='color:#818cf8;font-weight:700;font-size:15px'>🗃 "+S.orderItems.length+" item"+(S.orderItems.length!==1?"s":"")+" added to order</span>";
    div.appendChild(countBadge);
    const doneBtn=el("button",{class:"btn btn-green",style:{maxWidth:"320px",marginTop:"4px"}},"Done Adding Items → Scan Order QR");
    doneBtn.onclick=()=>{
      if(S.orderItems.length===0){showToast("Scan at least one item","warn");return;}
      stopScanner();
      setState({scanning:true,showOrderItemScan:false,showOrderQRScan:true,scanHint:"Scan the Order QR code to finalize"});
    };
    div.appendChild(doneBtn);
  }

  // Done button for multi-scan
  if(S.showMultiScan){
    const doneBtn=el("button",{class:"btn btn-green",style:{maxWidth:"320px",marginTop:"4px"}},`Done Scanning (${S.multiCodes.length} codes)`);
    doneBtn.onclick=()=>{stopScanner();setState({scanning:false,showMultiScan:false,showMultiConfirm:true});};
    div.appendChild(doneBtn);
  }

  const cancelBtn=el("button",{style:{padding:"12px 32px",borderRadius:"9px",background:"transparent",color:"#94a3b8",border:"1px solid #334155",fontSize:"14px",width:"100%",maxWidth:"320px"}},"Cancel");
  cancelBtn.onclick=()=>{stopScanner();setState({scanning:false,scanMode:null,multiMode:false,showMultiScan:false,multiCodes:[],multiDetails:null});};
  div.appendChild(cancelBtn);
  return div;
}

// ── ORDER GEN ─────────────────────────────────────────────────────────────────
function renderOrderGen(){
  const div=el("div",{class:"overlay"});
  const inner=el("div",{class:"overlay-inner"});
  const titleRow=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}});
  titleRow.innerHTML=`<h2 style="color:#f1f5f9;font-size:18px;font-weight:700;margin:0">Create Order QR</h2>`;
  const closeBtn=el("button",{style:{background:"none",border:"none",color:"#475569",fontSize:"24px",cursor:"pointer"}},"✕");
  closeBtn.onclick=()=>{setState({showOrderGen:false});loadData();};
  titleRow.appendChild(closeBtn);inner.appendChild(titleRow);
  let orderName="",assignTo="";
  const nameLabel=el("label",{class:"label"},"Order Name");
  const nameInput=el("input",{type:"text",placeholder:"e.g. Shipment Jan 2026"});
  nameInput.oninput=e=>orderName=e.target.value;
  inner.appendChild(nameLabel);inner.appendChild(nameInput);inner.appendChild(el("div",{style:{height:"16px"}}));
  const assignLabel=el("label",{class:"label"},"Assign Items To");
  const assignSelect=el("select");
  assignSelect.appendChild(el("option",{value:""},"Select owner…"));
  S.owners.forEach(o=>{const icon=o.id.toUpperCase()==="POOL"?"🏪":o.id==="USED"?"🗑":o.type==="locker"?"🗄":"👤";assignSelect.appendChild(el("option",{value:o.id},`${icon} ${o.name}`));});
  assignSelect.onchange=e=>assignTo=e.target.value;
  inner.appendChild(assignLabel);inner.appendChild(assignSelect);inner.appendChild(el("div",{style:{height:"20px"}}));
  const qrDiv=el("div",{id:"order-qr-result",style:{display:"none",textAlign:"center"}});
  inner.appendChild(qrDiv);
  const genBtn=el("button",{class:"btn btn-purple"},"Generate Order QR →");
  genBtn.onclick=async()=>{
    if(!orderName||!assignTo){showToast("Fill in all fields","warn");return;}
    genBtn.textContent="Creating…";genBtn.disabled=true;
    const orderId=`ORD-${Date.now()}`;
    const now=new Date().toISOString();
    try{
      await addOrder({id:orderId,name:orderName,count:0,createdBy:S.user.username,createdAt:now,status:"open",items:""});
      qrDiv.style.display="block";
      qrDiv.innerHTML=`<p style="color:#4ade80;font-weight:700;margin:0 0 4px">✅ Order Created!</p><p style="color:#94a3b8;font-size:13px;margin:0 0 16px">${orderName}</p><div id="oqr" style="display:inline-block;background:#fff;padding:12px;border-radius:10px;margin-bottom:12px"></div><p style="color:#64748b;font-size:11px;font-family:monospace;margin:0 0 16px">${orderId}</p>`;
      if(window.QRCode)new window.QRCode(document.getElementById("oqr"),{text:orderId,width:160,height:160});
      const printBtn=el("button",{class:"btn btn-primary",style:{marginBottom:"10px"}},"🖨 Print QR Code");
      printBtn.onclick=()=>{
        const pa=document.getElementById("print-area");
        pa.style.display="block";
        pa.innerHTML=`<h2 style="font-family:sans-serif">${orderName}</h2><div>${document.getElementById("oqr").innerHTML}</div><p style="font-family:monospace;font-size:12px">${orderId}</p>`;
        window.print();pa.style.display="none";
      };
      qrDiv.appendChild(printBtn);genBtn.style.display="none";showToast("Order created!");
    }catch(e){showToast("Failed to create order","err");genBtn.textContent="Generate Order QR →";genBtn.disabled=false;}
  };
  inner.appendChild(genBtn);div.appendChild(inner);return div;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────

function renderTransferPage(modal,owners,user){
  const item=modal.item;
  const isAdmin=user.role==="admin";
  const fromName=owners.find(o=>o.id===item.ownerId)?.name||item.ownerId;
  const userOwner=owners.find(o=>o.id===user.ownerId);

  // Full page takeover - no overlay, no z-index issues
  const page=document.createElement("div");
  page.style.cssText="position:fixed;inset:0;background:#0a0f1c;z-index:1000;overflow-y:auto;-webkit-overflow-scrolling:touch;";
  
  const inner=document.createElement("div");
  inner.style.cssText="max-width:480px;margin:0 auto;padding:24px 20px;";

  // Header
  const hdr=document.createElement("div");
  hdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-top:8px;";
  const title=document.createElement("h2");
  title.style.cssText="color:#f1f5f9;font-size:20px;font-weight:700;margin:0;";
  title.textContent="Transfer Item";
  const xBtn=document.createElement("button");
  xBtn.style.cssText="background:#1e293b;border:1px solid #334155;color:#94a3b8;font-size:18px;border-radius:8px;padding:8px 12px;cursor:pointer;font-family:inherit;";
  xBtn.textContent="✕ Cancel";
  xBtn.onclick=function(){setState({modal:null});};
  hdr.appendChild(title);hdr.appendChild(xBtn);
  inner.appendChild(hdr);

  // Item info card
  const itemCard=document.createElement("div");
  itemCard.style.cssText="background:#111827;border-radius:12px;border:1px solid #1e293b;padding:16px;margin-bottom:16px;";
  itemCard.innerHTML="<div style='color:#94a3b8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px'>Item</div>"
    +"<div style='color:#f1f5f9;font-weight:700;font-size:16px;margin-bottom:4px'>"+item.name+"</div>"
    +"<div style='color:#64748b;font-size:12px;font-family:monospace'>"+item.barcode+"</div>";
  inner.appendChild(itemCard);

  // From card
  const fromCard=document.createElement("div");
  fromCard.style.cssText="background:#0f172a;border-radius:12px;border:1px solid #334155;padding:16px;margin-bottom:16px;";
  fromCard.innerHTML="<div style='color:#94a3b8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px'>From</div>"
    +"<div style='color:#38bdf8;font-weight:700;font-size:16px'>"+fromName+"</div>";
  inner.appendChild(fromCard);

  // To section
  const toLabel=document.createElement("div");
  toLabel.style.cssText="color:#94a3b8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;";
  toLabel.textContent="Transfer To";
  inner.appendChild(toLabel);

  const validOwners=owners.filter(o=>o.id!==item.ownerId&&o.id!=="USED");
  let destOwnerId=isAdmin?(validOwners[0]?.id||""):user.ownerId;

  if(isAdmin){
    const sel=document.createElement("select");
    sel.style.cssText="width:100%;background:#0f172a;border:1px solid #334155;border-radius:9px;color:#f1f5f9;padding:14px;font-size:15px;margin-bottom:24px;font-family:inherit;box-sizing:border-box;";
    validOwners.forEach(function(o){
      const icon=o.id.toUpperCase()==="POOL"?"🏪":o.type==="locker"?"🗄":"👤";
      const opt=document.createElement("option");
      opt.value=o.id;opt.textContent=icon+" "+o.name;
      sel.appendChild(opt);
    });
    if(sel.options.length>0){sel.value=destOwnerId;}
    sel.onchange=function(){destOwnerId=this.value;};
    inner.appendChild(sel);
  } else {
    const destCard=document.createElement("div");
    destCard.style.cssText="background:#0f172a;border-radius:12px;border:1px solid #0ea5e9;padding:16px;margin-bottom:24px;";
    destCard.innerHTML="<div style='color:#38bdf8;font-weight:700;font-size:16px'>👤 "+(userOwner?.name||user.username)+"</div><div style='color:#475569;font-size:12px;margin-top:4px'>Your inventory</div>";
    inner.appendChild(destCard);
  }

  // Big confirm button - native element, no wrapper
  const confirmBtn=document.createElement("button");
  confirmBtn.textContent="✓ Confirm Transfer";
  confirmBtn.style.cssText="width:100%;padding:18px;border-radius:12px;border:none;background:#6366f1;color:#fff;font-weight:700;font-size:17px;cursor:pointer;display:block;font-family:inherit;margin-bottom:12px;-webkit-appearance:none;";
  confirmBtn.onclick=function(){
    const dest=destOwnerId;
    if(!dest){showToast("Please select a destination","warn");return;}
    if(dest===item.ownerId){showToast("Item is already in this inventory","warn");return;}
    submitTransfer(item,dest);
  };
  inner.appendChild(confirmBtn);

  const cancelBtn2=document.createElement("button");
  cancelBtn2.textContent="Cancel";
  cancelBtn2.style.cssText="width:100%;padding:14px;border-radius:12px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-weight:600;font-size:15px;cursor:pointer;display:block;font-family:inherit;-webkit-appearance:none;";
  cancelBtn2.onclick=function(){setState({modal:null});};
  inner.appendChild(cancelBtn2);

  page.appendChild(inner);
  return page;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function renderToast(){
  const {toast}=S;
  const bg=toast.type==="err"?"#7f1d1d":toast.type==="warn"?"#78350f":"#14532d";
  return el("div",{class:"toast",style:{background:bg}},toast.msg);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// Unregister any cached service workers
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(reg=>reg.unregister());
  });
}
// Render login screen immediately, load data only after Firebase + login
render();
fsWaitForReady().then(()=>{ loadData(); });
// Background sync every 60 seconds
setInterval(()=>{ if(S.user&&!S.loading) loadData(); }, 60000);

// Service worker disabled

// ── PWA INSTALL PROMPT ─────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if(document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#111827;border-top:1px solid #1e293b;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;';
  banner.innerHTML = '<div><div style="color:#f1f5f9;font-weight:700;font-size:14px">Install InvTrack</div><div style="color:#64748b;font-size:12px">Add to your home screen</div></div>';
  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:8px;';
  const installBtn = document.createElement('button');
  installBtn.textContent = 'Install';
  installBtn.style.cssText = 'background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;';
  installBtn.onclick = () => { if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; banner.remove(); }); } };
  const dismissBtn = document.createElement('button');
  dismissBtn.textContent = 'Later';
  dismissBtn.style.cssText = 'background:transparent;color:#64748b;border:1px solid #334155;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;';
  dismissBtn.onclick = () => banner.remove();
  btns.appendChild(installBtn); btns.appendChild(dismissBtn);
  banner.appendChild(btns);
  document.body.appendChild(banner);
}
